# Output configuration
output:
  format: bilingual_docx
  delivery_dir: ~/Desktop/
  internal_dir: ~/.stock-research-desk/
  memory_dir: ~/.stock-research-desk/memory_palace/
  watchlist_file: ~/.stock-research-desk/watchlist.json
  naming_pattern: "{timestamp}-{ticker}.docx"

# Verdict normalization
verdict_mapping:
  strong_buy: bullish
  buy: bullish
  买入: bullish
  强烈看好: bullish
  hold: watchlist
  观望: watchlist
  中性: watchlist
  watch: watchlist
  watching: watchlist
  sell: bearish
  卖出: bearish
  看空: bearish
  negative: bearish
  neutral: neutral

# Confidence normalization
confidence_mapping:
  very_high: high
  很高: high
  高确信: high
  moderate: medium
  中等: medium
  一般: medium
  weak: low
  低: low
  不确定: low