version: 1
interface:
  display_name: Stock Research Desk
  short_description: Codex-native stock research, screening, and watchlist workflow with 12-agent multi-factor pipeline
  default_prompt: Research stocks and sectors with Codex web search, investor councils, bilingual DOCX delivery, and automation-ready watchlists.

agents:
  - key: market_analyst
    display_name: Market Analyst
    short_description: Macro cycle and valuation framing

  - key: macro_policy_strategist
    display_name: Macro & Policy Strategist
    short_description: Monetary policy, credit cycle, and cross-asset analysis

  - key: company_analyst
    display_name: Company Analyst
    short_description: Business quality and management research

  - key: catalyst_event_tracker
    display_name: Catalyst & Event Tracker
    short_description: Event-driven catalyst and timeline intelligence

  - key: sentiment_simulator
    display_name: Sentiment Simulator
    short_description: Narrative and participant psychology

  - key: technical_flow_analyst
    display_name: Technical & Flow Analyst
    short_description: Price action, flow, and options intelligence

  - key: comparison_analyst
    display_name: Comparison Analyst
    short_description: Relative value and peer benchmarking

  - key: quant_factor_analyst
    display_name: Quant & Factor Analyst
    short_description: Factor exposure, statistical signal, and regime analysis

  - key: committee_red_team
    display_name: Red Team Committee
    short_description: Contrarian risk assessment

  - key: guru_council
    display_name: Guru Council
    short_description: Multi-stage investor council

  - key: mirofish_scenario_engine
    display_name: MiroFish Scenario Engine
    short_description: Multi-future world simulator

  - key: price_committee
    display_name: Price Committee
    short_description: Target price and sizing

execution_modes:
  single_name:
    sequence:
      - market_analyst
      - macro_policy_strategist
      - company_analyst
      - catalyst_event_tracker
      - sentiment_simulator
      - technical_flow_analyst
      - comparison_analyst
      - quant_factor_analyst
      - committee_red_team
      - guru_council
      - mirofish_scenario_engine
      - price_committee